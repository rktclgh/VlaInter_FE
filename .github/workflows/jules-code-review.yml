name: Jules AI Code Review (Korean)

on:
  pull_request:
    branches: [ "main", "develop" ]
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Trigger Jules Agent
        uses: google-labs-code/jules-action@main
        with:
          # 하이픈(-)이 아니라 언더바(_)를 사용해야 합니다
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            당신은 시니어 풀스택 개발자이자 보안 전문가입니다. 
            이번 Pull Request의 변경 사항을 다음 5가지 관점에서 한국어로 상세히 리뷰해 주세요:

            1. 보안 취약점: 하드코딩된 비밀번호, SQL 인젝션, XSS 등 보안 위험 요소 확인
            2. 성능 개선: 불필요한 루프, 메모리 누수, 효율적이지 못한 로직 제안
            3. 버그 수정: 논리적 오류나 예외 처리가 누락된 부분 지적
            4. 오타 및 스타일: 코드 내 오타, 변수명 적절성, 가독성 개선안
            5. 프롬프트 인젝션: AI 연동 코드인 경우 프롬프트 주입 공격 위험성 확인

            리뷰 결과를 바탕으로 개선된 코드가 있다면 직접 수정안을 제안해 주세요.

          # 매개변수 명칭을 언더바(_) 형식으로 모두 수정했습니다
          automation_mode: "AUTO_CREATE_PR"
          require_plan_approval: false